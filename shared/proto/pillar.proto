syntax = "proto3";

package pillar;

// Agent pushes node status to controller on a regular interval.
service PillarController {
    rpc ReportStatus(ReportStatusRequest) returns (ReportStatusResponse);
    rpc CommandStream(CommandStreamRequest) returns (stream ControllerCommand);
    rpc RegisterNode(RegisterNodeRequest) returns (RegisterNodeResponse);
    rpc ReportUpgradeStatus(UpgradeStatusRequest) returns (UpgradeStatusResponse);
    // Agent streams log batches from validator/agent services.
    rpc PushLogs(stream LogBatch) returns (LogAck);
}

message ReportStatusRequest {
    string node_id = 1;
    NodeStatus status = 2;
}

message ReportStatusResponse {}

message CommandStreamRequest {
    string node_id = 1;
}

// Flattened agent state + system metrics sent to controller.
// Agent writes node-health fields and enriches with system/process metrics.
message NodeStatus {
    string state = 1;
    int64  local_slot = 2;
    int64  reference_slot = 3;
    int64  slots_behind = 4;
    bool   healthy = 5;
    uint64 restart_count = 6;
    bool   crash_looping = 7;
    double health_check_duration_secs = 8;
    string version = 9;
    string role = 10;
    string client = 11;
    string cluster = 12;
    double cpu_usage_percent = 13;
    uint64 memory_used_bytes = 14;
    uint64 memory_total_bytes = 15;
    uint64 disk_used_bytes = 16;
    uint64 disk_total_bytes = 17;
    int64  updated_at_unix_secs = 18;
    uint64 state_duration_secs = 19;
    string validator_process = 20;
    uint64 network_rx_bytes = 21;
    uint64 network_tx_bytes = 22;
    double validator_cpu_percent = 23;
    uint64 validator_memory_bytes = 24;
    double agent_cpu_percent = 25;
    uint64 agent_memory_bytes = 26;
    reserved 27, 28;   // was link_cpu_percent, link_memory_bytes (duplicates of 25, 26)
    string agent_version = 29;
    reserved 30;        // was link_version (duplicate of 29)
    string pending_upgrade = 31;
    string hostname = 32;

    // --- Agent reconciler health ---
    uint64 reconcile_count = 33;
    uint64 health_check_errors = 34;
    uint32 consecutive_off_count = 35;
    uint64 recovery_count = 36;
    reserved 37, 38;    // was operator_state_write_errors, operator_pending_cmd_errors (dead IPC)
    uint64 agent_uptime_secs = 39;
    bool   version_mismatch = 40;

    // --- Controller connectivity ---
    bool   controller_connected = 41;
    uint64 controller_latency_ms = 42;
    uint64 status_reports_sent = 43;
    uint64 status_reports_failed = 44;
    reserved 45, 46;    // was link_state_file_age_secs, link_state_read_errors (dead IPC)
    uint64 log_batches_dropped = 47;
    reserved 48;        // was link_uptime_secs (duplicate of 39)
    uint64 commands_received = 49;

    // --- Process start time (unix epoch, stable per process lifetime) ---
    int64  agent_started_at_unix_secs = 50;
    reserved 51;        // was link_started_at_unix_secs (duplicate of 50)
}

// Commands pushed from controller to agent.
message ControllerCommand {
    oneof command {
        RestartCommand restart = 1;
        RecoverCommand recover = 2;
        UpdateConfigCommand update_config = 3;
        UpgradeCommand upgrade = 4;
        ProvisionCommand provision = 5;
        StopCommand stop = 6;
    }
}

message StopCommand {
    string reason = 1;
}

message RestartCommand {
    string reason = 1;
}

message RecoverCommand {
    string reason = 1;
}

message UpdateConfigCommand {
    bytes config_yaml = 1;
}

message UpgradeCommand {
    string binary_name = 1;
    string version = 2;
    string download_url = 3;
    string sha256 = 4;
    string reason = 5;
}

message RegisterNodeRequest {
    string node_id = 1;
    string role = 2;
    string client = 3;
    string cluster = 4;
    string agent_version = 5;
    string hostname = 6;
    string architecture = 7;
    string os = 8;
}

message RegisterNodeResponse {
    bool accepted = 1;
    string message = 2;
}

message UpgradeStatusRequest {
    string node_id = 1;
    string binary_name = 2;
    string version = 3;
    bool success = 4;
    string error_message = 5;
}

message UpgradeStatusResponse {}

// Log streaming from agent to controller.
message LogBatch {
    string node_id = 1;
    repeated LogEntry entries = 2;
}

message LogEntry {
    string service = 1;          // "validator", "agent"
    int64 timestamp_unix_ms = 2;
    string level = 3;            // "info", "warn", "error", "debug"
    string message = 4;
    string unit = 5;             // systemd unit name (e.g. "solana-validator.service")
}

// Provision a validator on the node (triggered from controller UI).
message ProvisionCommand {
    // Core identity
    string client = 1;             // "agave", "jito", "firedancer", "frankendancer"
    string version = 2;            // e.g. "2.1.6"
    string cluster = 3;            // "mainnet-beta", "testnet", "devnet"
    string identity_keypair_path = 4;
    string vote_account_keypair_path = 5;
    string ledger_path = 6;
    string snapshot_path = 7;
    string accounts_path = 8;
    repeated string entrypoints = 9;
    repeated string known_validators = 10;
    string download_url = 11;      // URL to fetch the validator binary
    string sha256 = 12;            // expected SHA256 of the binary
    bool jito_mev = 13;            // enable Jito MEV tip-distribution
    string jito_block_engine_url = 14;
    bool yellowstone_grpc = 15;    // enable Yellowstone gRPC plugin
    uint32 rpc_port = 16;         // RPC HTTP port (default 8899 if 0)
    string dynamic_port_range = 17; // e.g. "8000-8020"
    string node_type = 18;        // "validator", "rpc", "archival" (drives UI presets)
    uint32 gossip_port = 19;      // default 8001

    // Client-specific validator CLI flags.
    // Key = flag name without "--" prefix (e.g. "private-rpc", "limit-ledger-size").
    // Value = flag argument, or empty string for bare flags (e.g. "--no-voting").
    // Agave/Jito: rendered as --{key} {value}. Firedancer: translated to TOML config.
    // The UI populates this via node_type presets; users can add/override any flag.
    map<string, string> validator_flags = 20;

    // Geyser plugin config file paths (in addition to yellowstone_grpc auto-path)
    repeated string geyser_plugin_configs = 21;

    // Systemd Environment=KEY=VALUE entries
    map<string, string> environment_vars = 22;

    // Raw CLI arguments appended after all other flags (escape hatch)
    repeated string extra_args = 23;

    // Systemd unit tuning
    uint32 restart_sec = 24;           // default 1
    bool log_rate_limit_disable = 25;  // LogRateLimitIntervalSec=0
    bool start_limit_disable = 26;     // StartLimitIntervalSec=0
}

message LogAck {
    uint64 received_count = 1;
}
