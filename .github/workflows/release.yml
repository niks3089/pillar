name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      agent_release_created: ${{ steps.release.outputs['agent--release_created'] }}
      agent_version: ${{ steps.release.outputs['agent--version'] }}
      controller_release_created: ${{ steps.release.outputs['controller--release_created'] }}
      controller_version: ${{ steps.release.outputs['controller--version'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build:
    name: Build
    needs: release-please
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y protobuf-compiler

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        working-directory: controller/web
        run: |
          npm ci
          npm run build

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binaries
        run: cargo build --release -p pillar-agent -p pillar-controller

      - name: Read versions
        id: versions
        run: |
          AGENT_VERSION=$(grep -m1 '^version' agent/Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          CTRL_VERSION=$(grep -m1 '^version' controller/Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          echo "agent=${AGENT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "controller=${CTRL_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Agent: ${AGENT_VERSION}, Controller: ${CTRL_VERSION}"

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          cp target/release/agent artifacts/pillar-agent-linux-amd64
          cp target/release/controller artifacts/pillar-controller-linux-amd64
          cp scripts/install-controller.sh artifacts/install-controller.sh
          cp scripts/install-node.sh artifacts/install-node.sh
          chmod +x artifacts/*

      - name: Generate manifest.json
        env:
          AGENT_VERSION: ${{ steps.versions.outputs.agent }}
          CTRL_VERSION: ${{ steps.versions.outputs.controller }}
          GH_BASE: https://github.com/${{ github.repository }}/releases/latest/download
        run: |
          CTRL_SHA=$(sha256sum artifacts/pillar-controller-linux-amd64 | awk '{print $1}')
          AGENT_SHA=$(sha256sum artifacts/pillar-agent-linux-amd64 | awk '{print $1}')
          jq -n \
            --arg cv "$CTRL_VERSION" \
            --arg cu "$GH_BASE/pillar-controller-linux-amd64" \
            --arg cs "$CTRL_SHA" \
            --arg av "$AGENT_VERSION" \
            --arg au "$GH_BASE/pillar-agent-linux-amd64" \
            --arg ash "$AGENT_SHA" \
            '{controller:{version:$cv,download_url:$cu,sha256:$cs,release_notes:""},agent:{version:$av,download_url:$au,sha256:$ash,release_notes:""}}' \
            > artifacts/manifest.json
          echo "Generated manifest.json:"
          cat artifacts/manifest.json

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries
          path: artifacts/

  publish:
    name: Publish to GitHub Releases
    needs: [release-please, build]
    if: needs.release-please.outputs.agent_release_created == 'true' || needs.release-please.outputs.controller_release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-binaries
          path: artifacts/

      # Attach binaries + install scripts + manifest to the release(s) release-please
      # created this run, so `releases/latest/download/<asset>` resolves for installers.
      - name: Upload assets to release(s)
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if [ "${{ needs.release-please.outputs.agent_release_created }}" = "true" ]; then
            gh release upload "pillar-agent-v${{ needs.release-please.outputs.agent_version }}" artifacts/* --clobber
            echo "Uploaded assets to pillar-agent-v${{ needs.release-please.outputs.agent_version }}"
          fi
          if [ "${{ needs.release-please.outputs.controller_release_created }}" = "true" ]; then
            gh release upload "pillar-controller-v${{ needs.release-please.outputs.controller_version }}" artifacts/* --clobber
            echo "Uploaded assets to pillar-controller-v${{ needs.release-please.outputs.controller_version }}"
          fi
