name: Release

on:
  push:
    branches: [main]

env:
  S3_BUCKET: janus-meter
  S3_REGION: eu-north-1
  S3_PREFIX: pillar

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs['.--release_created'] }}
      tag_name: ${{ steps.release.outputs['.--tag_name'] }}
      version: ${{ steps.release.outputs['.--version'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build:
    name: Build
    needs: release-please
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y protobuf-compiler

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        working-directory: controller/web
        run: |
          npm ci
          npm run build

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binaries
        run: cargo build --release -p pillar-agent -p pillar-controller

      - name: Read version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep -m1 'version' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          cp target/release/agent artifacts/pillar-agent-linux-amd64
          cp target/release/controller artifacts/pillar-controller-linux-amd64
          cp scripts/install-controller.sh artifacts/install-controller.sh
          cp scripts/install-node.sh artifacts/install-node.sh
          chmod +x artifacts/*

      - name: Generate manifest.json
        env:
          VERSION: ${{ steps.version.outputs.version }}
          S3_URL: https://${{ env.S3_BUCKET }}.s3.${{ env.S3_REGION }}.amazonaws.com/${{ env.S3_PREFIX }}
        run: |
          CTRL_SHA=$(sha256sum artifacts/pillar-controller-linux-amd64 | awk '{print $1}')
          AGENT_SHA=$(sha256sum artifacts/pillar-agent-linux-amd64 | awk '{print $1}')
          jq -n \
            --arg cv "$VERSION" \
            --arg cu "$S3_URL/latest/pillar-controller-linux-amd64" \
            --arg cs "$CTRL_SHA" \
            --arg av "$VERSION" \
            --arg au "$S3_URL/latest/pillar-agent-linux-amd64" \
            --arg ash "$AGENT_SHA" \
            '{controller:{version:$cv,download_url:$cu,sha256:$cs,release_notes:""},agent:{version:$av,download_url:$au,sha256:$ash,release_notes:""}}' \
            > artifacts/manifest.json
          echo "Generated manifest.json:"
          cat artifacts/manifest.json

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries
          path: artifacts/

  upload:
    name: Upload to S3
    needs: [release-please, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-binaries
          path: artifacts/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.S3_REGION }}

      - name: Upload to S3 (latest)
        run: |
          aws s3 cp artifacts/ "s3://${S3_BUCKET}/${S3_PREFIX}/latest/" --recursive

      - name: Upload to S3 (versioned)
        if: needs.release-please.outputs.release_created == 'true'
        run: |
          VERSION="${{ needs.release-please.outputs.version }}"
          aws s3 cp artifacts/ "s3://${S3_BUCKET}/${S3_PREFIX}/v${VERSION}/" --recursive
          echo "Uploaded versioned release v${VERSION}"

      - name: Verify uploads
        run: |
          echo "Latest:"
          aws s3 ls "s3://${S3_BUCKET}/${S3_PREFIX}/latest/"
